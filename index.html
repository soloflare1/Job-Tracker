<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- fav icon -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

     <!-- tailwind  -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- icons  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Inter", sans-serif;;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
 
<section class="max-w-7xl mx-auto px-6 py-8 sm:px-10  sm:py-10">
    <h1 class="text-[#031761] font-bold text-4xl mb-6">Job Application Tracker</h1>
    
    <!-- stats -->
    <div class="stats grid grid-cols-3 mb-2 gap-4 ">
        <div class="card-1 bg-[#FFFFFF] px-6 py-5 rounded-lg mb-8 shadow-md">
            <p class="text-sm text-[#323B49] mb-1 font-semibold">Total</p>
            <p id="total" class="text-[#002C5C] text-2xl font-bold">8</p>
        </div>
        <div class="card-2 bg-[#FFFFFF] px-6 py-5 rounded-lg mb-8 shadow-md">
            <p class="text-sm text-[#323B49] mb-1 font-semibold">Interview</p>
            <p id="interview" class="text-[#10B981] text-2xl font-bold">0</p>
        </div>
        <div class="card-3 bg-[#FFFFFF] px-6 py-5 rounded-lg mb-8 shadow-md">
            <p class="text-sm text-[#323B49] mb-1 font-semibold">Rejected</p>
            <p id="rejected" class="text-[#EF4444] text-2xl font-bold">0</p>
        </div>
        
    </div>

    <hr class="text-[#E6E7E9] pt-3 pb-3">
    <!-- categories -->
    <div class="category flex item-center justify-between">
       <h4 class="text-[#031761] font-semibold text-xl mb-6">Available Jobs</h3>
       <span id="job-count" class="text-gray-500 font-semibold ">8 jobs</span>
    </div>

    <!-- Tab - category buttons -->
    <div class="cateButton flex items-center gap-2 mb-4">
        <button  onclick="switchTab('all')"
        id="tab-btn-all" class=" text-sm font-medium px-4 py-2 rounded bg-blue-600 text-white transition-all" >All</button>
        <button  onclick="switchTab('interview')"
        id="tab-btn-interview" class="  text-sm font-medium px-4 py-2 rounded text-gray-600 border border-gray-300 hover:bg-gray-200 transition-all" >Interview</button>
        <button onclick="switchTab('rejected')"
        id="tab-btn-rejected" class="  text-sm font-medium px-4 py-2 rounded text-gray-600  border border-gray-300 hover:bg-gray-200 transition-all" >Rejected</button>
    </div>

    <!-- job list -->
    <div id="jobs" class="job flex flex-col gap-3">

    </div>

</section>
    

<script src="script/data.js"></script>
<script src="script/script.js"></script>


</body>
</html>
